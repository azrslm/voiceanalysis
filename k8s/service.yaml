apiVersion: v1
kind: Service
metadata:
  name: voice-quality-evaluator
  labels:
    app: voice-quality-evaluator
spec:
  type: LoadBalancer  # Change to ClusterIP if using Ingress
  ports:
  - port: 80
    targetPort: 8501
    protocol: TCP
    name: http
  selector:
    app: voice-quality-evaluator
